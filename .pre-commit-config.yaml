# Pre-commit hooks for code quality gates
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  # Ruff: linting + formatting (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Mypy: type checking (warn only initially)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        additional_dependencies: [pydantic>=2.0, types-requests]
        pass_filenames: false
        entry: mypy backend/
        # Note: Remove 'verbose: true' after week 2 to make blocking

  # Commit message linting (conventional commits)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.25.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Secret scanning (trufflehog)
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.77.0
    hooks:
      - id: trufflehog
        entry: trufflehog filesystem . --only-verified
        stages: [pre-commit]
