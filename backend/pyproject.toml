[tool.black]
line-length = 100
target-version = ['py312']

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "C90", # mccabe complexity
    "D",   # pydocstyle (docstrings)
]
# Allow missing module/package docstrings initially (D100, D104)
# Allow missing public function docstrings initially (D103)
# These can be tightened after week 2
ignore = ["D100", "D104", "D103"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_ignores = true
# Start permissive, tighten later by setting to true
disallow_untyped_defs = false
plugins = ["pydantic.mypy"]
exclude = ["tests/", "migrations/", ".venv/"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
