[pytest]
# Pytest configuration for Thesis backend

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra test summary info
addopts =
    -v
    --strict-markers
    --tb=short

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database connection)
    slow: Slow running tests (> 5 seconds)
    api: API endpoint tests
    agent: Agent functionality tests
    security: Security and authorization tests
    performance: Performance and load tests
    e2e: End-to-end tests
    quality: Agent response quality tests
    routing: Agent routing tests
    meeting: Meeting room tests
    smoke: Smoke tests for deployment validation
    bias: LLM bias detection tests
    chaos: Chaos/resilience tests
    concurrent: Concurrent user tests
    contracts: API contract tests
    migrations: Database migration tests
    monitoring: Monitoring and observability tests

# Async mode for pytest-asyncio
asyncio_mode = auto

# Coverage configuration
# Run with: pytest --cov=. --cov-report=html
[coverage:run]
source = .
omit =
    tests/*
    .venv/*
    __pycache__/*
    migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
