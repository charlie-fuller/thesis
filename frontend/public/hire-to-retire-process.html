<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hire to Retire - Process Maps</title>
<style>
:root {
  --bg-page: #f8fafc;
  --bg-card: #ffffff;
  --text-primary: #1a1a2e;
  --text-secondary: #4a5568;
  --text-muted: #718096;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --accent: #3b82f6;
  --accent-light: #dbeafe;
  --workday: #d97706;
  --workday-bg: #fef3c7;
  --greenhouse: #059669;
  --greenhouse-bg: #d1fae5;
  --jira: #2563eb;
  --jira-bg: #dbeafe;
  --docusign: #7c3aed;
  --docusign-bg: #ede9fe;
  --payroll: #0891b2;
  --payroll-bg: #cffafe;
  --flag-red: #dc2626;
  --flag-bg: #fef2f2;
  --flag-border: #fecaca;
  --control-gold: #b45309;
  --control-bg: #fffbeb;
  --decision-bg: #fef9c3;
  --decision-border: #facc15;
  --start-bg: #d1fae5;
  --start-border: #10b981;
  --stop-bg: #fee2e2;
  --stop-border: #ef4444;
  --interface-bg: #e0e7ff;
  --interface-border: #6366f1;
  --ref-bg: #1e40af;
  --ref-text: #ffffff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
}
html.dark {
  --bg-page: var(--bg-page, #0a0a0a);
  --bg-card: var(--bg-card, #111111);
  --text-primary: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: #374151;
  --border-light: #1f2937;
  --accent-light: #1e3a5f;
  --workday-bg: #451a03;
  --greenhouse-bg: #064e3b;
  --jira-bg: #1e3a5f;
  --docusign-bg: #2e1065;
  --payroll-bg: #164e63;
  --flag-bg: #450a0a;
  --flag-border: #7f1d1d;
  --control-bg: #451a03;
  --decision-bg: #422006;
  --decision-border: #a16207;
  --start-bg: #064e3b;
  --start-border: #059669;
  --stop-bg: #450a0a;
  --stop-border: #dc2626;
  --interface-bg: #1e1b4b;
  --interface-border: #4f46e5;
  --gray-50: #111827;
  --gray-100: #1f2937;
  --gray-200: #374151;
  --gray-300: #4b5563;
  --gray-400: #6b7280;
  --gray-500: #9ca3af;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.5;
}
.container {
  max-width: 100%;
  padding: 24px;
}
h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}
.subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 20px;
}
/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 24px;
  overflow-x: auto;
}
.tab {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text-primary); background: var(--gray-50); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-swatch {
  width: 20px;
  height: 14px;
  border-radius: 3px;
  border: 2px solid;
  flex-shrink: 0;
}
.legend-swatch.process { background: var(--bg-card); border-color: var(--accent); }
.legend-swatch.decision { background: var(--decision-bg); border-color: var(--decision-border); }
.legend-swatch.start { background: var(--start-bg); border-color: var(--start-border); border-radius: 7px; }
.legend-swatch.stop { background: var(--stop-bg); border-color: var(--stop-border); border-radius: 7px; }
.legend-swatch.interface { background: var(--interface-bg); border-color: var(--interface-border); }
.legend-flag {
  width: 8px; height: 8px;
  background: var(--flag-red);
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-control {
  color: var(--control-gold);
  font-weight: 700;
  font-size: 11px;
}
.legend-sys {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.legend-sys.wd { background: var(--workday-bg); color: var(--workday); }
.legend-sys.gh { background: var(--greenhouse-bg); color: var(--greenhouse); }
.legend-sys.ji { background: var(--jira-bg); color: var(--jira); }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}
.filter-btn {
  padding: 4px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Swimlane diagram */
.swimlane-diagram {
  overflow-x: auto;
  padding-bottom: 16px;
}
.swimlane {
  display: flex;
  border-bottom: 1px solid var(--border-light);
  min-height: 100px;
}
.swimlane:last-child { border-bottom: none; }
.lane-label {
  min-width: 130px;
  width: 130px;
  padding: 16px 12px;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--gray-50);
  border-right: 3px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: sticky;
  left: 0;
  z-index: 2;
}
.lane-content {
  display: flex;
  align-items: center;
  padding: 16px 12px;
  gap: 4px;
  flex-wrap: wrap;
  min-width: 0;
}

/* Step cards */
.step {
  position: relative;
  min-width: 170px;
  max-width: 220px;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg-card);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.step:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transform: translateY(-1px);
}
.step.expanded {
  max-width: 360px;
}
.step-title {
  font-weight: 600;
  font-size: 12px;
  line-height: 1.4;
  margin-bottom: 4px;
}
.step-summary {
  color: var(--text-secondary);
  font-size: 11px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.step.expanded .step-summary {
  -webkit-line-clamp: unset;
}
.step-detail {
  display: none;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-light);
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.step.expanded .step-detail { display: block; }

/* Step types */
.step.start {
  background: var(--start-bg);
  border-color: var(--start-border);
  border-radius: 20px;
  min-width: 70px;
  max-width: 90px;
  text-align: center;
}
.step.stop {
  background: var(--stop-bg);
  border-color: var(--stop-border);
  border-radius: 20px;
  min-width: 70px;
  max-width: 90px;
  text-align: center;
}
.step.decision {
  background: var(--decision-bg);
  border-color: var(--decision-border);
}
.step.interface {
  background: var(--interface-bg);
  border-color: var(--interface-border);
}
.step.subprocess {
  border-style: double;
  border-width: 4px;
}

/* System badges */
.sys-badges {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.sys-badge {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.sys-badge.workday { background: var(--workday-bg); color: var(--workday); }
.sys-badge.greenhouse { background: var(--greenhouse-bg); color: var(--greenhouse); }
.sys-badge.jira { background: var(--jira-bg); color: var(--jira); }
.sys-badge.docusign { background: var(--docusign-bg); color: var(--docusign); }
.sys-badge.payroll { background: var(--payroll-bg); color: var(--payroll); }
.sys-badge.gsheet { background: var(--gray-100); color: var(--gray-600); }
.sys-badge.performio { background: #fce7f3; color: #be185d; }

/* Flag indicator */
.flag-dot {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 10px;
  height: 10px;
  background: var(--flag-red);
  border-radius: 50%;
  border: 2px solid var(--bg-card);
  z-index: 1;
}
.flag-count {
  position: absolute;
  top: -8px;
  right: -8px;
  min-width: 18px;
  height: 18px;
  background: var(--flag-red);
  color: white;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  z-index: 1;
}
.flag-list {
  margin-top: 8px;
  padding: 8px;
  background: var(--flag-bg);
  border: 1px solid var(--flag-border);
  border-radius: 4px;
}
.flag-item {
  font-size: 11px;
  color: var(--flag-red);
  line-height: 1.4;
  padding: 2px 0;
}
.flag-item + .flag-item {
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1px solid var(--flag-border);
}
.flag-source {
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
}

/* Control badge */
.control-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 1px 6px;
  background: var(--control-bg);
  border: 1px solid var(--control-gold);
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  color: var(--control-gold);
  margin-top: 4px;
}
.control-detail {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
  padding: 6px 8px;
  background: var(--control-bg);
  border-radius: 4px;
  line-height: 1.4;
}

/* Cross-lane reference */
.ref-marker {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--ref-bg);
  color: var(--ref-text);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

/* Arrow connector */
.arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  flex-shrink: 0;
  color: var(--gray-400);
  font-size: 16px;
}

/* Notes */
.process-note {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--gray-50);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 24px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-num {
  font-weight: 700;
  font-size: 18px;
}
.stat-num.red { color: var(--flag-red); }
.stat-num.gold { color: var(--control-gold); }
.stat-num.blue { color: var(--accent); }
.stat-label { color: var(--text-secondary); }

/* Section headers within panels */
.section-header {
  font-size: 18px;
  font-weight: 700;
  margin: 24px 0 12px 0;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.section-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}

/* Dimming for filter */
.step.dimmed { opacity: 0.2; }
.swimlane.dimmed .lane-label { opacity: 0.3; }

/* Print */
@media print {
  .tabs, .filter-bar { display: none; }
  .tab-panel { display: block !important; page-break-after: always; }
  .step { break-inside: avoid; }
}
</style>
</head>

<script>

          flags:[{text:'Legal check handled manually via email to Will Simmons -- no structured/embedded workflow.', source:'CKO Workshop'},{text:'Check for skill overlap done with Comp team over Slack.', source:'CKO Workshop'}]

        { title:'Negotiate Offer', summary:'Recruiter confirms offer details including compensation, equity, and start date.', systems:['greenhouse'],

        },
        { title:'Offer Approval', summary:'Offer approved in Greenhouse by RecOps, regional Recruiting leader, Budget owner, and Ray.',

          controls:[{id:'HR.03', text:'Final offer approved by hiring manager (requester), ELT, and recruiting in Greenhouse before offer letter is generated and sent via email.'}],

// ── RENDER ENGINE ─────────────────────────────────────────────────────────

function renderTabs() {
  var tabsEl = document.getElementById('tabs');
  PROCESSES.forEach(function(p, i) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = p.title;
    btn.dataset.target = p.id;
    btn.onclick = function() { switchTab(p.id); };
    tabsEl.appendChild(btn);
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.target === id);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + id);
  });
}

function countFlags(process) {
  var count = 0;
  process.lanes.forEach(function(lane) {
    lane.steps.forEach(function(step) {
      if (step.flags) count += step.flags.length;
    });
  });
  return count;
}

function countControls(process) {
  var count = 0;
  process.lanes.forEach(function(lane) {
    lane.steps.forEach(function(step) {
      if (step.controls) count += step.controls.length;
    });
  });
  return count;
}

function countSteps(process) {
  var count = 0;
  process.lanes.forEach(function(lane) {
    lane.steps.forEach(function(step) {
      if (step.type !== 'start' && step.type !== 'stop') count++;
    });
  });
  return count;
}

function collectSystems(process) {
  var sys = {};
  process.lanes.forEach(function(lane) {
    lane.steps.forEach(function(step) {
      if (step.systems) step.systems.forEach(function(s) { sys[s] = true; });
    });
  });
  return Object.keys(sys);
}

function renderProcess(process) {
  var panel = document.createElement('div');
  panel.className = 'tab-panel' + (process === PROCESSES[0] ? ' active' : '');
  panel.id = 'panel-' + process.id;

  var flagCount = countFlags(process);
  var controlCount = countControls(process);
  var stepCount = countSteps(process);
  var systems = collectSystems(process);

  // Stats bar
  var stats = document.createElement('div');
  stats.className = 'stats-bar';
  stats.innerHTML = '<div class="stat-item"><span class="stat-num blue">' + stepCount + '</span><span class="stat-label">Process Steps</span></div>' +
    '<div class="stat-item"><span class="stat-num gold">' + controlCount + '</span><span class="stat-label">Key Controls</span></div>' +
    '<div class="stat-item"><span class="stat-num red">' + flagCount + '</span><span class="stat-label">Workshop Flags</span></div>' +
    '<div class="stat-item"><span class="stat-num blue">' + process.lanes.length + '</span><span class="stat-label">Swim Lanes</span></div>';
  panel.appendChild(stats);

  // Description
  var desc = document.createElement('p');
  desc.className = 'section-desc';
  desc.textContent = process.description;
  panel.appendChild(desc);

  // Filter bar
  if (systems.length > 0 || flagCount > 0) {
    var filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';
    filterBar.innerHTML = '<label>Filter:</label>';
    var allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.textContent = 'All Steps';
    allBtn.onclick = function() { clearFilter(process.id); };
    allBtn.dataset.processId = process.id;
    allBtn.dataset.filter = 'all';
    filterBar.appendChild(allBtn);
    if (flagCount > 0) {
      var flagBtn = document.createElement('button');
      flagBtn.className = 'filter-btn';
      flagBtn.textContent = 'Flags Only (' + flagCount + ')';
      flagBtn.onclick = function() { filterByFlag(process.id); };
      flagBtn.dataset.processId = process.id;
      flagBtn.dataset.filter = 'flags';
      filterBar.appendChild(flagBtn);
    }
    systems.forEach(function(sys) {
      var sysBtn = document.createElement('button');
      sysBtn.className = 'filter-btn';
      sysBtn.textContent = sys.charAt(0).toUpperCase() + sys.slice(1);
      sysBtn.onclick = function() { filterBySystem(process.id, sys); };
      sysBtn.dataset.processId = process.id;
      sysBtn.dataset.filter = sys;
      filterBar.appendChild(sysBtn);
    });
    panel.appendChild(filterBar);
  }

  // Swimlane diagram
  var diagram = document.createElement('div');
  diagram.className = 'swimlane-diagram';
  diagram.dataset.processId = process.id;

  process.lanes.forEach(function(lane) {
    var laneEl = document.createElement('div');
    laneEl.className = 'swimlane';
    laneEl.dataset.lane = lane.name;

    var label = document.createElement('div');
    label.className = 'lane-label';
    label.style.borderRightColor = lane.color;
    label.style.color = lane.color;
    label.textContent = lane.name;
    laneEl.appendChild(label);

    var content = document.createElement('div');
    content.className = 'lane-content';

    lane.steps.forEach(function(step, idx) {
      // Reference-in marker
      if (step.ref_in) {
        var refIn = document.createElement('div');
        refIn.className = 'ref-marker';
        refIn.textContent = step.ref_in;
        refIn.title = 'From reference ' + step.ref_in;
        content.appendChild(refIn);
        var a0 = document.createElement('div');
        a0.className = 'arrow';
        a0.textContent = '\u2192';
        content.appendChild(a0);
      }

      // Arrow before step (except first in lane or after ref_in)
      if (idx > 0 && !step.ref_in) {
        var arrow = document.createElement('div');
        arrow.className = 'arrow';
        arrow.textContent = '\u2192';
        content.appendChild(arrow);
      }

      // Step card
      var card = document.createElement('div');
      card.className = 'step' + (step.type ? ' ' + step.type : '');
      card.dataset.processId = process.id;
      if (step.systems) card.dataset.systems = step.systems.join(',');
      if (step.flags) card.dataset.hasFlags = 'true';

      // Flag indicator
      if (step.flags && step.flags.length > 0) {
        var flagIndicator = document.createElement('div');
        if (step.flags.length > 1) {
          flagIndicator.className = 'flag-count';
          flagIndicator.textContent = step.flags.length;
        } else {
          flagIndicator.className = 'flag-dot';
        }
        card.appendChild(flagIndicator);
      }

      // Title
      var titleEl = document.createElement('div');
      titleEl.className = 'step-title';
      titleEl.textContent = step.title;
      card.appendChild(titleEl);

      // Summary
      if (step.summary) {
        var summEl = document.createElement('div');
        summEl.className = 'step-summary';
        summEl.textContent = step.summary;
        card.appendChild(summEl);
      }

      // System badges
      if (step.systems && step.systems.length > 0) {
        var badges = document.createElement('div');
        badges.className = 'sys-badges';
        step.systems.forEach(function(sys) {
          var badge = document.createElement('span');
          badge.className = 'sys-badge ' + sys;
          badge.textContent = sys.charAt(0).toUpperCase() + sys.slice(1);
          badges.appendChild(badge);
        });
        card.appendChild(badges);
      }

      // Controls
      if (step.controls) {
        step.controls.forEach(function(ctrl) {
          var ctrlBadge = document.createElement('div');
          ctrlBadge.className = 'control-badge';
          ctrlBadge.innerHTML = '&#9733; ' + ctrl.id;
          card.appendChild(ctrlBadge);
        });
      }

      // Detail (expandable)
      var detailContent = '';
      if (step.detail) detailContent += '<p>' + step.detail.replace(/\n/g, '<br>') + '</p>';
      if (step.controls) {
        step.controls.forEach(function(ctrl) {
          detailContent += '<div class="control-detail"><strong>' + ctrl.id + ':</strong> ' + ctrl.text + '</div>';
        });
      }
      if (step.flags) {
        detailContent += '<div class="flag-list">';
        step.flags.forEach(function(f) {
          detailContent += '<div class="flag-item">' + f.text + '<div class="flag-source">' + f.source + '</div></div>';
        });
        detailContent += '</div>';
      }
      if (detailContent) {
        var detail = document.createElement('div');
        detail.className = 'step-detail';
        detail.innerHTML = detailContent;
        card.appendChild(detail);
      }

      // Click to expand
      if (detailContent) {
        card.onclick = function(e) {
          e.stopPropagation();
          card.classList.toggle('expanded');
        };
      }

      content.appendChild(card);

      // Reference-out marker
      if (step.ref) {
        var a1 = document.createElement('div');
        a1.className = 'arrow';
        a1.textContent = '\u2192';
        content.appendChild(a1);
        var refOut = document.createElement('div');
        refOut.className = 'ref-marker';
        refOut.textContent = step.ref;
        refOut.title = 'To reference ' + step.ref;
        content.appendChild(refOut);
      }
    });

    laneEl.appendChild(content);
    diagram.appendChild(laneEl);
  });

  panel.appendChild(diagram);

  // Notes
  if (process.id === 'hire-to-paycheck') {
    var note = document.createElement('div');
    note.className = 'process-note';
    note.innerHTML = '<strong>Note:</strong> The CKO Workshop (Feb 12, 2026) identified 26 flags across this process. ' +
      'Flags indicate manual steps, rework, frequent errors, dependencies, and areas requiring process improvement. ' +
      'Click any step with a red indicator to see the specific flags.<br><br>' +
      '<strong>Scope note:</strong> The current "Zero Friction Lifecycle" initiative (led by Danny and Mikki) is focusing on the front end first: ' +
      'headcount creation through onboarding. Mid-career changes, promotions, and terminations are deferred.';
    panel.appendChild(note);
  }
  if (process.id === 'pops-audits') {
    var note2 = document.createElement('div');
    note2.className = 'process-note';
    note2.innerHTML = '<strong>Note:</strong> While shown in sequential flow, many Global audit reports run simultaneously. ' +
      'Audits are conducted monthly. Changes are made to Workday and picked up by Payroll in their monthly or bi-weekly processing.';
    panel.appendChild(note2);
  }

  return panel;
}

// ── FILTERS ───────────────────────────────────────────────────────────────

function clearFilter(processId) {
  updateFilterButtons(processId, 'all');
  var diagram = document.querySelector('.swimlane-diagram[data-process-id="' + processId + '"]');
  diagram.querySelectorAll('.step').forEach(function(s) { s.classList.remove('dimmed'); });
  diagram.querySelectorAll('.swimlane').forEach(function(s) { s.classList.remove('dimmed'); });
}

function filterByFlag(processId) {
  updateFilterButtons(processId, 'flags');
  var diagram = document.querySelector('.swimlane-diagram[data-process-id="' + processId + '"]');
  diagram.querySelectorAll('.step').forEach(function(s) {
    s.classList.toggle('dimmed', s.dataset.hasFlags !== 'true');
  });
  diagram.querySelectorAll('.swimlane').forEach(function(s) { s.classList.remove('dimmed'); });
}

function filterBySystem(processId, system) {
  updateFilterButtons(processId, system);
  var diagram = document.querySelector('.swimlane-diagram[data-process-id="' + processId + '"]');
  diagram.querySelectorAll('.step').forEach(function(s) {
    var sysList = (s.dataset.systems || '').split(',');
    var match = sysList.indexOf(system) >= 0;
    s.classList.toggle('dimmed', !match && s.className.indexOf('start') < 0 && s.className.indexOf('stop') < 0);
  });
}

function updateFilterButtons(processId, activeFilter) {
  document.querySelectorAll('.filter-btn[data-process-id="' + processId + '"]').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.filter === activeFilter);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────

function init() {
  renderTabs();
  var panelsEl = document.getElementById('panels');
  PROCESSES.forEach(function(p) {
    panelsEl.appendChild(renderProcess(p));
  });

  // Close expanded cards when clicking outside
  document.addEventListener('click', function() {
    document.querySelectorAll('.step.expanded').forEach(function(s) {
      s.classList.remove('expanded');
    });
  });
}

// ── THEME SYNC (for iframe embedding in Thesis) ──────────────────────────
function syncTheme() {
  try {
    if (window.parent === window) return false;
    var parentRoot = window.parent.document.documentElement;
    var ps = getComputedStyle(parentRoot);
    if (!ps.getPropertyValue('--color-bg-page').trim()) return false;
    var dark = parentRoot.classList.contains('dark');
    if (dark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    var map = {
      '--color-bg-page':'--bg-page','--color-bg-card':'--bg-card',
      '--color-gray-50':'--gray-50','--color-gray-100':'--gray-100',
      '--color-gray-200':'--gray-200','--color-gray-300':'--gray-300',
      '--color-gray-400':'--gray-400','--color-gray-500':'--gray-500',
      '--color-gray-600':'--gray-600','--color-gray-700':'--gray-700',
      '--color-gray-800':'--gray-800','--color-gray-900':'--gray-900'
    };
    var root = document.documentElement;
    for (var pk in map) {
      var v = ps.getPropertyValue(pk).trim();
      if (v) root.style.setProperty(map[pk], v);
    }
    return true;
  } catch(e) { return false; }
}

syncTheme();
setInterval(syncTheme, 2000);
init();
</script>
