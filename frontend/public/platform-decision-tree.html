<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Platform Selection Decision Tree</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
      min-height: 100vh;
      color: var(--gray-800);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--gray-600);
      font-size: 1rem;
    }

    .version {
      color: var(--gray-600);
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    .progress-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .progress-step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: white;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
      transition: all 0.3s ease;
    }

    .progress-step.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .progress-step.completed {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .progress-step .step-number {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: currentColor;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .progress-step.active .step-number,
    .progress-step.completed .step-number {
      background: rgba(255,255,255,0.3);
    }

    .decision-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      padding: 2rem;
      margin-bottom: 1.5rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stage-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: var(--primary-light);
      color: white;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .question {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 1.5rem;
    }

    .options-grid {
      display: grid;
      gap: 1rem;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem;
      background: var(--gray-50);
      border: 2px solid var(--gray-200);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      width: 100%;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    .option-btn.selected {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .option-icon {
      width: 40px;
      height: 40px;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .option-icon.glean { background: #e0f2fe; }
    .option-icon.google { background: #fef3c7; }
    .option-icon.gemini { background: #dbeafe; }
    .option-icon.notebooklm { background: #fef9c3; }
    .option-icon.custom { background: #f3e8ff; }
    .option-icon.claude { background: #fce7f3; }
    .option-icon.mulesoft { background: #ddd6fe; }
    .option-icon.yes { background: #d1fae5; }
    .option-icon.no { background: #fee2e2; }
    .option-icon.maybe { background: #fef3c7; }

    .option-content {
      flex: 1;
    }

    .option-title {
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 0.25rem;
    }

    .option-desc {
      font-size: 0.875rem;
      color: var(--gray-600);
    }

    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1.5rem;
    }

    .info-box.warning {
      background: #fef3c7;
      border-color: #fcd34d;
    }

    .info-box.danger {
      background: #fee2e2;
      border-color: #fca5a5;
    }

    .info-box h4 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .info-box ul {
      font-size: 0.875rem;
      margin-left: 1.5rem;
      color: var(--gray-700);
    }

    .info-box p {
      font-size: 0.875rem;
      color: var(--gray-700);
      margin-top: 0.5rem;
    }

    .result-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      animation: slideIn 0.3s ease;
    }

    .result-card.stop {
      background: linear-gradient(135deg, var(--danger) 0%, #f87171 100%);
    }

    .result-card.review {
      background: linear-gradient(135deg, var(--warning) 0%, #fbbf24 100%);
    }

    .result-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .result-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .result-desc {
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }

    .result-details {
      background: rgba(255,255,255,0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .result-details h4 {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .result-details ul {
      margin-left: 1.25rem;
      font-size: 0.875rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-light);
    }

    .btn-white {
      background: white;
      color: var(--gray-800);
    }

    .btn-white:hover {
      background: var(--gray-100);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid currentColor;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-200);
    }

    .decision-path {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .path-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: var(--gray-600);
    }

    .path-item::after {
      content: '\2192';
      margin-left: 0.5rem;
      color: var(--gray-400);
    }

    .path-item:last-child::after {
      display: none;
    }

    .path-item strong {
      color: var(--gray-800);
    }

    .checklist {
      margin-top: 1.5rem;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--gray-50);
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .checklist-item input {
      margin-top: 0.25rem;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .platform-card {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }

    .platform-card h4 {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .platform-card p {
      font-size: 0.75rem;
      color: var(--gray-600);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .container {
        padding: 1rem;
      }

      .progress-bar {
        gap: 0.25rem;
      }

      .progress-step {
        padding: 0.35rem 0.5rem;
        font-size: 0.65rem;
      }

      .progress-step .step-label {
        display: none;
      }
    }

    /* Dark mode overrides */
    html.dark {
      --gray-50: #0a0a0a;
      --gray-100: #111111;
      --gray-200: #27272a;
      --gray-300: #3f3f46;
      --gray-600: #d4d4d8;
      --gray-700: #e4e4e7;
      --gray-800: #f4f4f5;
      --gray-900: #ffffff;
    }

    html.dark body {
      background: #0a0a0a;
      color: #ffffff;
    }

    html.dark .decision-card {
      background: #111111;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    }

    html.dark .option-btn {
      background: #1a1a1a;
      border-color: #27272a;
    }

    html.dark .option-btn:hover {
      background: #111111;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    html.dark .option-btn.selected {
      background: rgba(99, 102, 241, 0.1);
    }

    html.dark .progress-step {
      background: #111111;
      border-color: #27272a;
      color: #a1a1aa;
    }

    html.dark .info-box {
      background: #111827;
      border-color: #1e3a5f;
    }

    html.dark .info-box.warning {
      background: #1a1400;
      border-color: #3d3200;
    }

    html.dark .info-box.danger {
      background: #1f0a0a;
      border-color: #3d1515;
    }

    html.dark .nav-buttons {
      border-top-color: #27272a;
    }

    html.dark .btn-outline {
      color: #e4e4e7;
    }

    html.dark .btn-white {
      background: #1a1a1a;
      color: #e4e4e7;
    }

    html.dark .btn-white:hover {
      background: #27272a;
    }

    html.dark .checklist-item {
      background: #1a1a1a;
    }

    html.dark .platform-card {
      background: #1a1a1a;
      border-color: #27272a;
    }

    html.dark .option-icon.glean { background: #0e2a33; }
    html.dark .option-icon.google { background: #2d2009; }
    html.dark .option-icon.gemini { background: #1e2a4a; }
    html.dark .option-icon.notebooklm { background: #2d2a09; }
    html.dark .option-icon.custom { background: #1e1633; }
    html.dark .option-icon.claude { background: #2d121e; }
    html.dark .option-icon.mulesoft { background: #1a1533; }
    html.dark .option-icon.yes { background: #0e261a; }
    html.dark .option-icon.no { background: #2d1219; }
    html.dark .option-icon.maybe { background: #2d2009; }
  </style>
</head>

<script>
(function() {
  var root = document.documentElement;
  function syncFromParent() {
    try {
      if (!window.parent || window.parent === window) return false;
      var ps = getComputedStyle(window.parent.document.documentElement);
      var bodyBg = getComputedStyle(window.parent.document.body).backgroundColor;
      if (!bodyBg) return false;
      var m = bodyBg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
      if (!m) return false;
      var brightness = (parseInt(m[1]) * 299 + parseInt(m[2]) * 587 + parseInt(m[3]) * 114) / 1000;
      if (brightness < 128) { root.classList.add('dark'); } else { root.classList.remove('dark'); }
      var bgPage = ps.getPropertyValue('--color-bg-page').trim();
      var bgCard = ps.getPropertyValue('--color-bg-card').trim();
      var bgHover = ps.getPropertyValue('--color-bg-hover').trim();
      var primary = ps.getPropertyValue('--color-primary').trim();
      var primaryHover = ps.getPropertyValue('--color-primary-hover').trim();
      if (bgPage) { root.style.setProperty('--bg-page', bgPage); root.style.setProperty('--bg-page-end', bgPage); }
      if (bgCard) root.style.setProperty('--bg-card', bgCard);
      if (bgHover) root.style.setProperty('--gray-50', bgHover);
      if (primary) root.style.setProperty('--primary', primary);
      if (primaryHover) root.style.setProperty('--primary-light', primaryHover);
      return true;
    } catch (e) { return false; }
  }
  syncFromParent();
  var attempts = 0;
  var poller = setInterval(function() {
    attempts++;
    if (syncFromParent() || attempts >= 50) {
      clearInterval(poller);
      if (attempts >= 50 && !root.classList.contains('dark')) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('dark');
      }
    }
  }, 200);
  try {
    if (window.parent && window.parent !== window) {
      new MutationObserver(function() { syncFromParent(); })
        .observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['class', 'style'] });
    }
  } catch (e) {}
})();
</script>

    function renderNode(nodeId) {
      const node = decisionTree[nodeId];
      const container = document.getElementById('decision-container');

      // Update progress
      updateProgress(node.stage);

      if (node.type === 'stop' || node.type === 'review' || node.type === 'result') {
        renderEndNode(node, container);
      } else {
        renderDecisionNode(node, nodeId, container);
      }
    }

    function renderDecisionNode(node, nodeId, container) {
      let html = `
        <div class="decision-card">
          <span class="stage-badge">Stage ${node.stage}</span>
          ${history.length > 0 ? renderPath() : ''}
          <h2 class="question">${node.question}</h2>
      `;

      if (node.info) {
        const infoType = node.info.type || 'info';
        html += `
          <div class="info-box ${infoType}">
            <h4>${node.info.title}</h4>
            <ul>
              ${node.info.items.map(item => `<li>${item}</li>`).join('')}
            </ul>
            ${node.info.note ? `<p><em>${node.info.note}</em></p>` : ''}
          </div>
        `;
      }

      html += '<div class="options-grid">';
      node.options.forEach(opt => {
        html += `
          <button class="option-btn" onclick="selectOption('${nodeId}', '${opt.id}', '${opt.next}')">
            <div class="option-icon ${opt.icon}">${opt.emoji}</div>
            <div class="option-content">
              <div class="option-title">${opt.title}</div>
              <div class="option-desc">${opt.desc}</div>
            </div>
          </button>
        `;
      });
      html += '</div>';

      if (history.length > 0) {
        html += `
          <div class="nav-buttons">
            <button class="btn btn-outline" onclick="goBack()">\u2190 Back</button>
            <button class="btn btn-outline" onclick="restart()">Start Over</button>
          </div>
        `;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function renderEndNode(node, container) {
      let cardClass = node.type === 'stop' ? 'stop' : (node.type === 'review' ? 'review' : '');

      let html = `
        <div class="result-card ${cardClass}">
          <div class="result-icon">${node.icon}</div>
          <h2 class="result-title">${node.title}</h2>
          <p class="result-desc">${node.desc}</p>
      `;

      if (node.details) {
        html += `
          <div class="result-details">
            <h4>${node.details.title}</h4>
            <ul>
              ${node.details.items.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      if (node.result === 'platform_matrix') {
        html += renderPlatformRecommendation();
      }

      html += `
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <button class="btn btn-white" onclick="goBack()">\u2190 Back</button>
          <button class="btn btn-white" onclick="restart()">Start Over</button>
        </div>
      </div>
      `;

      container.innerHTML = html;
    }

      const mulesoftChoice = answers.mulesoft_path;
      const largeContextChoice = answers.large_context;
      const accessChoice = answers.user_access;
      const companyChoice = answers.company_wide;
      const teamChoice = answers.team_access;
      const individualChoice = answers.individual_access;
      const complexityChoice = answers.complexity;
      const governanceChoice = answers.governance_eval;

      // Data-driven recommendations
      if (dataChoice === 'large_files' || contextChoice === 'no') {
        if (largeContextChoice === 'gemini') {
          primary = 'Gemini';
          notes.push('Large context/file needs - 2M token context, 2GB uploads');
        } else if (largeContextChoice === 'notebooklm') {
          primary = 'NotebookLM';
          notes.push('Document/video analysis - SOP generation capability');
        } else if (largeContextChoice === 'claude') {
          primary = 'Claude';
          notes.push('Complex reasoning needs - requires enterprise license');
          notes.push('NOT approved for German employees');
        } else if (largeContextChoice === 'chunk') {
          primary = 'Custom Build';
          notes.push('Custom document chunking strategy needed');
        }
      } else if (dataChoice === 'google_data') {
        if (googleChoice === 'gemini') {
          primary = 'Gemini';
          notes.push('Google Workspace data analysis with 2M token context');
        } else if (googleChoice === 'gems') {
          primary = 'Gems (Shared Agents)';
          notes.push('Shareable team agents with Google Workspace actions');
        } else if (googleChoice === 'notebooklm') {
          primary = 'NotebookLM';
          notes.push('Document analysis and visual content generation');
        }
      } else if (dataChoice === 'external_systems') {
        if (externalChoice === 'yes_governed' || mulesoftChoice === 'proceed_mulesoft') {
          primary = 'MuleSoft Agent Fabric';
          notes.push('Enterprise governance with trace IDs and SOC compliance');
          notes.push('Cloud 2.0 POC in progress - demo targeted Feb 20-28');
        } else if (externalChoice === 'glean_action') {
          primary = 'Glean (with Custom Actions)';
          notes.push('API call triggered from Glean agent interface');
        } else {
          primary = 'Custom Build';
          notes.push('Direct API integration with custom code');
        }
      }

      // Override with complexity-driven recommendations
      if (complexityChoice === 'integration' && primary === 'Glean') {
        if (governanceChoice === 'high_governance') {
          primary = 'MuleSoft Agent Fabric';
          notes.push('System integration + high governance = enterprise MCP hosting');
        } else {
          primary = 'Custom Build';
          notes.push('System integration requires custom development');
        }
      }

      if (complexityChoice === 'multi_step' && primary === 'Glean') {
        secondary = 'Consider Gemini or Claude for complex multi-step reasoning';
      }

      // Access-driven overrides
      if (companyChoice === 'gemini' || teamChoice === 'gems') {
        primary = 'Gemini / Gems';
        notes.push('Team-shareable agent with Google Workspace actions');
      }
      if (teamChoice === 'notebooklm' || individualChoice === 'notebooklm') {
        primary = 'NotebookLM';
        notes.push('Document and video analysis tool');
      }
      if (individualChoice === 'claude' || teamChoice === 'claude_team') {
        primary = 'Claude';
        notes.push('Proposed 5-10 Claude Desktop licenses for stakeholders');
        notes.push('NOT approved for German employees');
      }

      // Governance-driven notes
      if (governanceChoice === 'high_governance') {
        governanceNotes.push('Ensure trace IDs and audit logging are in place');
        governanceNotes.push('SOC compliance reporting capability required');
        if (primary !== 'MuleSoft Agent Fabric') {
          governanceNotes.push('Consider MuleSoft Agent Fabric for governance layer');
        }
      }

      let html = `
        <div class="result-details">
          <h4>Recommended Platform: ${primary}</h4>
          ${notes.length > 0 ? `<ul>${notes.map(n => `<li>${n}</li>`).join('')}</ul>` : ''}
          ${secondary ? `<p style="margin-top: 0.5rem; font-style: italic;">${secondary}</p>` : ''}
        </div>
      `;

      if (governanceNotes.length > 0) {
        html += `
          <div class="result-details">
            <h4>Governance Requirements</h4>
            <ul>${governanceNotes.map(n => `<li>${n}</li>`).join('')}</ul>
          </div>
        `;
      }

      html += `
        <div class="result-details">
          <h4>Final Checklist</h4>
          <ul>
            <li>\u2610 Platform selected based on decision flow</li>
            <li>\u2610 Owner/process lead identified and committed</li>
            <li>\u2610 Governance criteria evaluated (reliability, governance, traceability, auditability, fault tolerance)</li>
            <li>\u2610 Documentation and handoff plan in place</li>
            <li>\u2610 Backup owner identified (if Medium+ risk)</li>
            <li>\u2610 Security/compliance checks passed</li>
            <li>\u2610 German Works Council approval (if applicable)</li>
            <li>\u2610 Legal review triggered if needed</li>
            <li>\u2610 Registered with IT (no shadow IT)</li>
          </ul>
        </div>
      `;

      return html;
    }

    function renderPath() {
      if (history.length === 0) return '';

      let html = '<div class="decision-path">';
      history.forEach((h, i) => {
        const node = decisionTree[h.node];
        const opt = node.options.find(o => o.id === h.choice);
        html += `<span class="path-item"><strong>${opt.title}</strong></span>`;
      });
      html += '</div>';
      return html;
    }

    function updateProgress(stage) {
      document.querySelectorAll('.progress-step').forEach(step => {
        const stepStage = parseInt(step.dataset.stage);
        step.classList.remove('active', 'completed');
        if (stepStage < stage) {
          step.classList.add('completed');
        } else if (stepStage === stage) {
          step.classList.add('active');
        }
      });
    }

    function selectOption(nodeId, choiceId, nextNode) {
      answers[nodeId] = choiceId;
      history.push({ node: nodeId, choice: choiceId });
      currentNode = nextNode;
      renderNode(currentNode);
    }

    function goBack() {
      if (history.length > 0) {
        const last = history.pop();
        delete answers[last.node];
        currentNode = last.node;
        renderNode(currentNode);
      }
    }

    function restart() {
      currentNode = 'start';
      history = [];
      answers = {};
      renderNode(currentNode);
    }

    // Initialize
    renderNode('start');
  </script>
</body>
</html>
