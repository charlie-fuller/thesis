<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Platform Selection Decision Tree</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-page, linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%));
      min-height: 100vh;
      color: var(--gray-800);
      line-height: 1.5;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }

    header { text-align: center; margin-bottom: 2.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; color: var(--gray-900); margin-bottom: 0.25rem; }
    .subtitle { color: var(--gray-600); font-size: 0.9rem; }
    .version { color: var(--gray-600); font-size: 0.7rem; margin-top: 0.25rem; }

    .progress-bar {
      display: flex; justify-content: center; gap: 0.5rem; margin: 1.5rem 0; flex-wrap: wrap;
    }
    .progress-step {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.75rem;
      background: var(--bg-card, white); border-radius: 9999px; font-size: 0.7rem;
      font-weight: 500; color: var(--gray-600); border: 1px solid var(--gray-200);
      transition: all 0.3s ease;
    }
    .progress-step.active { background: var(--primary); color: white; border-color: var(--primary); }
    .progress-step.completed { background: var(--success); color: white; border-color: var(--success); }
    .progress-step .step-number {
      width: 18px; height: 18px; border-radius: 50%; background: currentColor;
      display: flex; align-items: center; justify-content: center; font-size: 0.65rem;
    }
    .progress-step.active .step-number,
    .progress-step.completed .step-number { background: rgba(255,255,255,0.3); }

    .decision-card {
      background: var(--bg-card, white); border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      padding: 2rem; margin-bottom: 1.5rem; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stage-badge {
      display: inline-block; padding: 0.2rem 0.6rem; background: var(--primary-light);
      color: white; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; margin-bottom: 0.75rem;
    }

    .question { font-size: 1.15rem; font-weight: 600; color: var(--gray-900); margin-bottom: 1.25rem; }

    .options-grid { display: grid; gap: 0.75rem; }

    .option-btn {
      display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem 1.25rem;
      background: var(--gray-50); border: 2px solid var(--gray-200); border-radius: 0.75rem;
      cursor: pointer; transition: all 0.2s ease; text-align: left; width: 100%;
    }
    .option-btn:hover {
      border-color: var(--primary); border-left-color: var(--primary);
      background: var(--bg-card, white); transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.15);
    }
    .option-btn.type-continue, .option-btn.type-stop, .option-btn.type-review { }

    .option-content { flex: 1; }
    .option-title { font-weight: 600; color: var(--gray-800); margin-bottom: 0.15rem; font-size: 0.95rem; }
    .option-desc { font-size: 0.8rem; color: var(--gray-600); line-height: 1.4; }

    .info-box {
      background: transparent; border: 1px dashed var(--info); border-radius: 0.5rem;
      padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--gray-600);
    }
    .info-box.warning { border-color: var(--warning); }
    .info-box.danger { border-color: var(--danger); }
    .info-box h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--info); }
    .info-box ul { margin-left: 1.25rem; color: var(--gray-600); font-size: 0.8rem; }
    .info-box p { color: var(--gray-600); margin-top: 0.35rem; }

    .options-label {
      font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.75px;
      color: var(--primary); margin-bottom: 0.5rem;
    }

    .result-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white; border-radius: 1rem; padding: 2rem; animation: slideIn 0.3s ease;
    }
    .result-card.stop { background: linear-gradient(135deg, var(--danger) 0%, #f87171 100%); }
    .result-card.review { background: linear-gradient(135deg, var(--warning) 0%, #fbbf24 100%); }

    .result-header { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 0.5rem; }
    .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-desc { opacity: 0.9; margin-bottom: 1.25rem; font-size: 0.9rem; }

    .result-details {
      background: rgba(255,255,255,0.2); border-radius: 0.5rem;
      padding: 1rem; text-align: left; margin-bottom: 1rem;
    }
    .result-details h4 { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .result-details ul { margin-left: 1.25rem; font-size: 0.8rem; }
    .result-details li { margin-bottom: 0.25rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.25rem;
      border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
      border: none; font-size: 0.8rem;
    }
    .btn-white { background: var(--bg-card, white); color: var(--gray-800); }
    .btn-white:hover { background: var(--gray-100); }
    .btn-outline { background: transparent; border: 2px solid currentColor; }

    .nav-buttons {
      display: flex; justify-content: space-between; margin-top: 1.25rem;
      padding-top: 1.25rem; border-top: 1px solid var(--gray-200);
    }

    .decision-path { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .path-item {
      display: flex; align-items: center; gap: 0.25rem; font-size: 0.7rem; color: var(--gray-600);
    }
    .path-item::after { content: '\2192'; margin-left: 0.4rem; color: var(--gray-400); }
    .path-item:last-child::after { display: none; }
    .path-item strong { color: var(--gray-800); }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .progress-bar { gap: 0.25rem; }
      .progress-step { padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .progress-step .step-label { display: none; }
    }

    html.dark {
      --gray-50: #0a0a0a; --gray-100: #111111; --gray-200: #27272a; --gray-300: #3f3f46;
      --gray-600: #d4d4d8; --gray-700: #e4e4e7; --gray-800: #f4f4f5; --gray-900: #ffffff;
    }
    html.dark body { background: var(--bg-page, #0a0a0a); color: var(--gray-900); }
    html.dark .decision-card {
      background: var(--bg-card, #111111);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -1px rgba(0,0,0,0.2);
    }
    html.dark .option-btn { background: var(--gray-100); border-color: var(--gray-200); }
    html.dark .option-btn:hover {
      background: var(--bg-card, #111111); border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(99,102,241,0.25);
    }
    html.dark .progress-step { background: var(--bg-card, #111111); border-color: var(--gray-200); }
    html.dark .info-box { background: transparent; border-color: #3b82f680; }
    html.dark .info-box.warning { background: transparent; border-color: var(--gray-300); }
    html.dark .info-box.danger { background: transparent; border-color: var(--gray-300); }
    html.dark .nav-buttons { border-top-color: var(--gray-200); }
    html.dark .btn-outline { color: var(--gray-700); }
    html.dark .btn-white { background: var(--gray-100); color: var(--gray-700); }
    html.dark .btn-white:hover { background: var(--gray-200); }
  </style>
</head>

<script>
(function() {
  var root = document.documentElement;
  function parseHex(h) {
    if (!h || h.charAt(0) !== '#') return null;
    h = h.replace('#','');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }
  function toHex(r,g,b) {
    return '#' + [r,g,b].map(function(c) {
      var x = Math.round(Math.max(0,Math.min(255,c))).toString(16);
      return x.length < 2 ? '0'+x : x;
    }).join('');
  }
  function mix(a,b,t) {
    if (!a||!b) return null;
    return toHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
  }
  function syncFromParent() {
    try {
      if (!window.parent || window.parent === window) return false;
      var parentRoot = window.parent.document.documentElement;
      var ps = getComputedStyle(parentRoot); if (!ps.getPropertyValue('--color-bg-page').trim()) return false;
      var bgPage = ps.getPropertyValue('--color-bg-page').trim();
      var bgCard = ps.getPropertyValue('--color-bg-card').trim();
      var bgHover = ps.getPropertyValue('--color-bg-hover').trim();
      var textPrimary = ps.getPropertyValue('--color-text-primary').trim();
      var textSecondary = ps.getPropertyValue('--color-text-secondary').trim();
      var textMuted = ps.getPropertyValue('--color-text-muted').trim();
      var borderDefault = ps.getPropertyValue('--color-border-default').trim();
      var primary = ps.getPropertyValue('--color-primary').trim();
      var primaryHover = ps.getPropertyValue('--color-primary-hover').trim();
      if (!bgPage || !textPrimary) return false;
      var bodyBg = getComputedStyle(window.parent.document.body).backgroundColor;
      if (bodyBg) {
        var m = bodyBg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (m) {
          var br = (parseInt(m[1])*299+parseInt(m[2])*587+parseInt(m[3])*114)/1000;
          if (br < 128) root.classList.add('dark'); else root.classList.remove('dark');
        }
      }
      var cCard = parseHex(bgCard), cBorder = parseHex(borderDefault);
      var cMuted = parseHex(textMuted), cSecondary = parseHex(textSecondary);
      var cPrimary = parseHex(textPrimary);
      root.style.setProperty('--bg-page', bgPage);
      root.style.setProperty('--bg-page-end', bgPage);
      root.style.setProperty('--bg-card', bgCard);
      root.style.setProperty('--gray-50', bgHover);
      root.style.setProperty('--gray-100', mix(cCard, cBorder, 0.3) || bgHover);
      root.style.setProperty('--gray-200', borderDefault);
      root.style.setProperty('--gray-300', mix(cBorder, cMuted, 0.25) || borderDefault);
      root.style.setProperty('--gray-400', mix(cBorder, cMuted, 0.5) || textMuted);
      root.style.setProperty('--gray-500', textMuted);
      root.style.setProperty('--gray-600', textSecondary);
      root.style.setProperty('--gray-700', mix(cSecondary, cPrimary, 0.4) || textSecondary);
      root.style.setProperty('--gray-800', mix(cSecondary, cPrimary, 0.75) || textPrimary);
      root.style.setProperty('--gray-900', textPrimary);
      if (primary) root.style.setProperty('--primary', primary);
      if (primaryHover) root.style.setProperty('--primary-light', primaryHover);
      return true;
    } catch (e) { return false; }
  }
  syncFromParent();
  var attempts = 0;
  var poller = setInterval(function() {
    attempts++;
    if (syncFromParent() || attempts >= 50) {
      clearInterval(poller);
      if (attempts >= 50 && !root.classList.contains('dark')) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('dark');
      }
    }
  }, 200);
  try {
    if (window.parent && window.parent !== window) {
      new MutationObserver(function() { syncFromParent(); })
        .observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['class', 'style'] });
    }
  } catch (e) {}
})();
</script>

      context_fit: {

      // ── Google Workspace sub-tree ──
      google_needs: {

      mulesoft_choice: {

      // ── Large Files sub-tree ──
      large_needs: {

      // ── Claude gate ──
      claude_german_check: {

      // ── Multiple Sources sub-tree ──
      multi_check: {
        stage: 4,
        question: "Are all the sources you need available in Glean?",
        info: {
          title: "Glean indexes 15+ systems. If most data is there:",
          items: [

        options: [

      // ── Recommendation terminals ──
      rec_glean:               { stage: 5, type: "result", platform: "glean" },
      rec_gemini:              { stage: 5, type: "result", platform: "gemini" },
      rec_gems:                { stage: 5, type: "result", platform: "gems" },
      rec_notebooklm:          { stage: 5, type: "result", platform: "notebooklm" },
      rec_claude:              { stage: 5, type: "result", platform: "claude" },
      rec_mulesoft:            { stage: 5, type: "result", platform: "mulesoft" },
      rec_custom:              { stage: 5, type: "result", platform: "custom" },
      rec_custom_governed:     { stage: 5, type: "result", platform: "custom_governed" },
      rec_custom_chunk:        { stage: 5, type: "result", platform: "custom_chunk" },
      rec_custom_orchestration:{ stage: 5, type: "result", platform: "custom_orchestration" },
      rec_glean_action:        { stage: 5, type: "result", platform: "glean_action" },
      rec_glean_mcp:           { stage: 5, type: "result", platform: "glean_mcp" },

      // ── Stop / Review terminals ──
      stop_not_ai: {
        stage: 1, type: "stop",

          items: [
            "Document the specific requirement and why AI was considered",

          ]
        }
      },

      stop_discuss: {
        stage: 1, type: "review",
        title: "Discuss with the governance team",
        desc: "When requirements are unclear, a conversation with the governance team can help define the use case and evaluate options.",
        details: {
          title: "Prepare for the conversation:",
          items: [
            "Document the use case clearly: what problem, for whom, how often",
            "List what you know and what you are uncertain about",
            "Identify the key decision criteria (accuracy, speed, cost, compliance)",
            "Schedule a review with Steffen or Raza"
          ]
        }
      },

      stop_legal_review: {
        stage: 3, type: "review",
        title: "Legal review required before proceeding",

        }
      },

      stop_connector: {
        stage: 4, type: "review",
        title: "Evaluate building a Glean connector",
        desc: "The data source you need is not connected to Glean yet, but an API exists that could enable a custom connector.",
        details: {

          items: [
            "Check the Glean Connector Tracking page in Confluence for status",
            "The Chorus custom connector can serve as a build template",

      },

      stop_no_api: {
        stage: 4, type: "stop",
        title: "No integration path available",
        desc: "Without an API, there is no way to programmatically connect this data source to an AI platform.",
        details: {

          items: [
            "Manual data export to a connected system (e.g., upload to Google Drive for Glean indexing)",

      },

      stop_works_council: {
        stage: 4, type: "review",
        title: "German Works Council approval required",
        desc: "The platform best suited for this use case has not been approved for German employees. A Works Council review is required before proceeding.",
        details: {
          title: "Process (Jan 2026 Framework):",
          items: [
            "Check if the tool meets expedited approval criteria (no location tracking, etc.)",
            "Submit via the Works Agreements page in Confluence",
            "Contact Matthew Fisher or Aaron Ting for Legal support",
            "Consider an approved alternative (Gemini handles large context and is German-approved)",
            "The Jan 2026 framework provides a faster approval path than previous processes"

        }
      }
    };

    // ── State ────────────────────────────────────────────────────────
    let currentNode = 'start';
    let history = [];
    let answers = {};

    // ── Dynamic option filtering ─────────────────────────────────────
    function getVisibleOptions(nodeId, options) {
      if (nodeId === 'large_needs') {
        var audience = answers.access_scope;
        return options.filter(function(opt) {
          // Hide deep-reasoning option for company-wide deployment
          if (opt.id === 'deep_reasoning' && audience === 'everyone') return false;
          return true;
        });
      }
      return options;
    }

    // ── Render ───────────────────────────────────────────────────────
    function renderNode(nodeId) {
      var node = decisionTree[nodeId];
      var container = document.getElementById('decision-container');
      updateProgress(node.stage);

      if (node.type === 'result') {
        renderRecommendation(node, container);
      } else if (node.type === 'stop' || node.type === 'review') {
        renderEndNode(node, container);
      } else {
        renderDecisionNode(node, nodeId, container);
      }
    }

    function renderDecisionNode(node, nodeId, container) {
      var visibleOptions = getVisibleOptions(nodeId, node.options);
      var html = '<div class="decision-card">';
      html += '<span class="stage-badge">Step ' + node.stage + '</span>';
      if (history.length > 0) html += renderPath();
      html += '<h2 class="question">' + node.question + '</h2>';

      if (node.info) {
        html += '<div class="info-box">';
        html += '<h4>' + node.info.title + '</h4><ul>';
        node.info.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
        html += '</ul></div>';
      }

      html += '<div class="options-label">Choose one</div>';
      html += '<div class="options-grid">';
      visibleOptions.forEach(function(opt) {
        var typeClass = opt.type ? ' type-' + opt.type : '';
        html += '<button class="option-btn' + typeClass + '" onclick="selectOption(\'' + nodeId + '\',\'' + opt.id + '\',\'' + opt.next + '\')">';
        html += '<div class="option-content">';
        html += '<div class="option-title">' + opt.title + '</div>';
        html += '<div class="option-desc">' + opt.desc + '</div>';
        html += '</div></button>';
      });
      html += '</div>';

      if (history.length > 0) {
        html += '<div class="nav-buttons">';
        html += '<button class="btn btn-outline" onclick="goBack()">Back</button>';
        html += '<button class="btn btn-outline" onclick="restart()">Start Over</button>';
        html += '</div>';
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function renderEndNode(node, container) {
      var cardClass = node.type === 'stop' ? 'stop' : 'review';
      var label = node.type === 'stop' ? 'STOP' : 'REVIEW NEEDED';

      var html = '<div class="result-card ' + cardClass + '">';
      html += '<div class="result-header">' + label + '</div>';
      html += '<h2 class="result-title">' + node.title + '</h2>';
      html += '<p class="result-desc">' + node.desc + '</p>';

      if (node.details) {
        html += '<div class="result-details"><h4>' + node.details.title + '</h4><ul>';
        node.details.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
        html += '</ul></div>';
      }

      html += '<div style="display:flex;gap:0.75rem;justify-content:center;margin-top:0.5rem">';
      html += '<button class="btn btn-white" onclick="goBack()">Back</button>';
      html += '<button class="btn btn-white" onclick="restart()">Start Over</button>';
      html += '</div></div>';
      container.innerHTML = html;
    }

    function renderRecommendation(node, container) {
      var info = platformInfo[node.platform];
      if (!info) return;

      var audience = answers.access_scope || '';
      var warnings = [];

      // Audience-specific warnings
      if (audience === 'everyone' && (node.platform === 'custom' || node.platform === 'custom_governed' || node.platform === 'custom_chunk' || node.platform === 'custom_orchestration')) {
        warnings.push('Company-wide custom solutions require justification: document why Glean and Gemini cannot meet this need, provide ROI analysis, and identify a committed maintenance owner.');
      }
      if (node.platform === 'claude') {
        warnings.push('Claude requires enterprise licensing (proposed 5-10 seats). Not suitable for broad company-wide deployment.');
      }

      var html = '<div class="result-card">';
      html += '<div class="result-header">RECOMMENDED PLATFORM</div>';
      html += '<h2 class="result-title">' + info.name + '</h2>';
      html += '<p class="result-desc">' + info.why + '</p>';

      // Capabilities
      html += '<div class="result-details"><h4>Key Capabilities</h4><ul>';
      info.capabilities.forEach(function(c) { html += '<li>' + c + '</li>'; });
      html += '</ul></div>';

      // Limitations
      html += '<div class="result-details"><h4>Limitations</h4><ul>';
      info.limitations.forEach(function(l) { html += '<li>' + l + '</li>'; });
      html += '</ul></div>';

      // Warnings
      if (warnings.length > 0) {
        html += '<div class="result-details" style="border:1px solid rgba(255,255,255,0.3)">';
        html += '<h4>Important Notes for Your Situation</h4><ul>';
        warnings.forEach(function(w) { html += '<li>' + w + '</li>'; });
        html += '</ul></div>';
      }

      // Operations model
      html += '<div class="result-details"><h4>Operations Model</h4>';
      html += '<p style="font-size:0.85rem">' + info.opsModel + '</p></div>';

      // Deployment readiness checklist
      html += '<div class="result-details"><h4>Deployment Readiness Checklist</h4><ul>';
      html += '<li>Confirm operations model: platform-managed or builder-maintained</li>';

      if (info.opsModel.indexOf('Builder') >= 0 || info.opsModel.indexOf('builder') >= 0) {
        html += '<li>Builder committed to weekly health checks and 24-hour issue response</li>';
        html += '<li>Builder has 6+ month company tenure (or backup owner identified)</li>';
        html += '<li>Backup owner identified and briefed</li>';
      }

      html += '<li>Governance criteria assessed: reliability, traceability, auditability, fault tolerance</li>';
      html += '<li>Solution documented for potential handoff</li>';
      html += '<li>Registered with IT -- no shadow deployments</li>';

      if (audience === 'everyone') {
        html += '<li>Company-wide access confirmed for all 500+ employees</li>';
      }

      html += '<li>German Works Council status confirmed (if German employees will use this)</li>';
      html += '</ul></div>';

      html += '<div style="display:flex;gap:0.75rem;justify-content:center;margin-top:0.5rem">';
      html += '<button class="btn btn-white" onclick="goBack()">Back</button>';
      html += '<button class="btn btn-white" onclick="restart()">Start Over</button>';
      html += '</div></div>';
      container.innerHTML = html;
    }

    function renderPath() {
      if (history.length === 0) return '';
      var html = '<div class="decision-path">';
      history.forEach(function(h) {
        var node = decisionTree[h.node];
        if (!node || !node.options) return;
        var opt = node.options.find(function(o) { return o.id === h.choice; });
        if (opt) html += '<span class="path-item"><strong>' + opt.title + '</strong></span>';
      });
      html += '</div>';
      return html;
    }

    function updateProgress(stage) {
      document.querySelectorAll('.progress-step').forEach(function(step) {
        var s = parseInt(step.dataset.stage);
        step.classList.remove('active', 'completed');
        if (s < stage) step.classList.add('completed');
        else if (s === stage) step.classList.add('active');
      });
    }

    function selectOption(nodeId, choiceId, nextNode) {
      answers[nodeId] = choiceId;
      history.push({ node: nodeId, choice: choiceId });
      currentNode = nextNode;
      renderNode(currentNode);
    }

    function goBack() {
      if (history.length > 0) {
        var last = history.pop();
        delete answers[last.node];
        currentNode = last.node;
        renderNode(currentNode);
      }
    }

    function restart() {
      currentNode = 'start';
      history = [];
      answers = {};
      renderNode(currentNode);
    }

    renderNode('start');
  </script>
