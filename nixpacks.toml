[phases.setup]
nixPkgs = ["python311", "nodejs_21"]

[phases.install]
cmds = [
    "cd frontend && npm install && npm run build",
    "cd ../backend && pip install -r requirements.txt",
    "ls -la",
    "ls -la docs/",
    "cp -rv docs/help backend/docs_help",
    "ls -la backend/docs_help/"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
